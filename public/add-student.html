<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Student</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
margin:0;
background:linear-gradient(135deg,#1d3557,#457b9d);
}

.container{
width:65%;
margin:40px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
color:#1d3557;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input,select{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

input:focus,select:focus{
outline:none;
border:1px solid #457b9d;
}

.full{
grid-column:1 / 3;
}

.file-box{
border:1px dashed #aaa;
padding:20px;
text-align:center;
border-radius:6px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.file-box input[type="file"]{
margin-top:10px;
cursor:pointer;
}

button{
margin-top:10px;
padding:12px;
background:#2a9d8f;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
width:100%;
}

button:hover{
background:#21867a;
}

.back-link{
text-align:center;
margin-top:15px;
}

.back-link a{
text-decoration:none;
color:#0077ff;
font-weight:bold;
}

.back-link a:hover{
text-decoration:underline;
}


/* MOBILE RESPONSIVE */

@media (max-width:768px){

.container{
width:90%;
padding:20px;
}

.form-grid{
grid-template-columns:1fr;
}

.full{
grid-column:1;
}

h2{
font-size:22px;
}

input,select{
font-size:16px;
padding:12px;
}

button{
font-size:16px;
padding:14px;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Add Student</h2>

<form action="/add-student" method="POST" enctype="multipart/form-data">

<div class="form-grid">

<input type="text" name="name" placeholder="Student Name" required>
<input type="text" name="registerNo" placeholder="Register Number" required>

<input type="text" name="phone" placeholder="Phone Number" required>
<input type="text" name="parentPhone" placeholder="Parent Phone">

<input type="text" name="email" placeholder="Email">

<select name="gender">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input type="text" name="fatherName" placeholder="Father Name">
<input type="text" name="motherName" placeholder="Mother Name">

<input type="date" name="dob">

<select name="bloodGroup">
<option value="">Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>

<input type="text" name="caste" placeholder="Caste">
<input type="text" name="religion" placeholder="Religion">

<input type="text" name="attendancePercentage" placeholder="Attendance %">
<input type="text" name="semesterPercentage" placeholder="Semester %">

<input type="text" name="course" placeholder="Course / Department">

<input type="text" name="address" placeholder="Address" class="full">

<div class="file-box full">
<label for="photo"><strong>Student Photo</strong></label>
<input type="file" name="photo" id="photo" accept="image/*">
</div>

<button type="submit" class="full">Add Student</button>

</div>

</form>

<div class="back-link">
<a href="/dashboard">← Back to Dashboard</a>
</div>

</div>

</body>
</htm
